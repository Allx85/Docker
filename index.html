<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Djupets Farkost</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at top, #1a1a1a, #050505);
    font-family: Georgia, serif;
    color: #d9b36c;
}

.ocean {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.title {
    text-align: center;
    margin-top: 30px;
    font-size: 3rem;
    text-shadow: 0 0 15px #ffb347;
    letter-spacing: 3px;
}

.subtitle {
    text-align: center;
    color: #999;
}

.submarine {
    position: absolute;
    top: 55%;
    left: 40%;
}

.body {
    width: 320px;
    height: 90px;
    background: linear-gradient(to right, #50361d, #7a5b33);
    border-radius: 50px;
    box-shadow: 0 0 25px rgba(255,180,80,0.3);
    position: relative;
}

.tower {
    position: absolute;
    width: 70px;
    height: 45px;
    background: #6d4b28;
    top: -30px;
    left: 120px;
    border-radius: 10px;
}

.window {
    position: absolute;
    width: 22px;
    height: 22px;
    background: orange;
    border-radius: 50%;
    box-shadow: 0 0 15px orange;
    top: 34px;
}

.w1 { left: 70px; }
.w2 { left: 140px; }
.w3 { left: 210px; }

.bubble {
    position: absolute;
    background: rgba(255,255,255,.5);
    border-radius: 50%;
    bottom: -20px;
    animation: rise 6s infinite;
}

.b1 { width: 10px; height: 10px; left: 20%; }
.b2 { width: 15px; height: 15px; left: 50%; animation-delay: 2s; }
.b3 { width: 8px; height: 8px; left: 80%; animation-delay: 4s; }

@keyframes rise {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}

.runes {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
    color: rgba(255,180,80,0.4);
    font-size: 1.2rem;
    letter-spacing: 10px;
}
</style>
</head>

<body>

<div class="ocean">

    <div class="title">DJUPETS FARKOST</div>
    <div class="subtitle">En relik från den glömda världen</div>

    <div class="submarine">
        <div class="body">
            <div class="tower"></div>
            <div class="window w1"></div>
            <div class="window w2"></div>
            <div class="window w3"></div>
        </div>
    </div>

    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>

    <div class="runes">
        ✦ ⚔ ✦ ☉ ✦ ⚚ ✦ ☽ ✦
    </div>

</div>

</body>
</html>
